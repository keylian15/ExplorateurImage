repos:
  - repo: local
    hooks:
      - id: ruff-fix
        name: ruff (auto-fix)
        entry: ruff check --fix .
        language: python
        pass_filenames: false
        always_run: true
        additional_dependencies: [ruff]

      - id: ruff-format
        name: ruff (format)
        entry: ruff format .
        language: python
        pass_filenames: false
        always_run: true
        additional_dependencies: [ruff]

      - id: ruff-check
        name: ruff (check strict)
        entry: ruff check .
        language: python
        pass_filenames: false
        always_run: true
        additional_dependencies: [ruff]